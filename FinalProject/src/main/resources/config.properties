# Ride-Sharing Simulation Configuration
# ======================================

# Simulation Parameters
# ---------------------
# Number of drivers available in the system
simulation.driver.count=2

# Time interval between generating new ride requests (milliseconds)
# 1000ms = 1 second, 2000ms = 2 seconds
simulation.request.interval.ms=1000

# Maximum number of ride requests to generate
# After reaching this number, the generator will stop
simulation.max.requests=15

# Strategy Selection
# ------------------
# Available strategies: COMPOSITE, NEAREST_DRIVER, LOAD_BALANCING
#
# COMPOSITE: Priority (Express > Standard > Wait) ? Time ? Distance
#   - Fast, simple FIFO from priority queue
#   - Best for high concurrency
#   - Respects customer service tiers
#
# NEAREST_DRIVER: Match closest available driver
#   - Minimizes driver-to-customer distance
#   - Best for low demand periods
#   - WARNING: Slower in high concurrency (9x slower in tests)
#
# LOAD_BALANCING: Distribute evenly across drivers
#   - Tracks ride count per driver
#   - Assigns to driver with fewest rides
#   - Best for fair workload distribution
#
simulation.dispatch.strategy=LOAD_BALANCING

# Logging Configuration
# ---------------------
# Log level: TRACE, DEBUG, INFO, WARN, ERROR
logging.level=INFO

# Log file location (relative to project root)
logging.file.path=logs/simulation.log

# Performance Metrics
# -------------------
# Enable/disable performance tracking
metrics.enabled=true

# Enable/disable detailed request logging
# Set to false for cleaner output, true for debugging
metrics.detailed.logging=true