# Ride-Sharing Simulation Configuration
# ======================================

# Simulation Parameters
# ---------------------
# Number of drivers available in the system
simulation.driver.count=3

# Time interval between generating new ride requests (milliseconds)
# 1000ms = 1 second, 2000ms = 2 seconds
simulation.request.interval.ms=2000

# Maximum number of ride requests to generate
# After reaching this number, the generator will stop
simulation.max.requests=10

# Strategy Selection
# ------------------
# Available strategies: COMPOSITE, NEAREST_DRIVER, LOAD_BALANCING
# COMPOSITE: Priority (Express > Standard > Wait) ? Time ? Distance
# NEAREST_DRIVER: Match closest available driver (coming in Day 2)
# LOAD_BALANCING: Distribute evenly across drivers (coming in Day 3)
simulation.dispatch.strategy=COMPOSITE

# Logging Configuration
# ---------------------
# Log level: TRACE, DEBUG, INFO, WARN, ERROR
logging.level=INFO

# Log file location (relative to project root)
logging.file.path=logs/simulation.log

# Performance Metrics
# -------------------
# Enable/disable performance tracking
metrics.enabled=true

# Enable/disable detailed request logging
metrics.detailed.logging=true